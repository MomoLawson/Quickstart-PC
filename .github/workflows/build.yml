name: Build and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'quickstart.sh'
      - 'scripts/**'
      - 'utils/**'
      - 'config/**'
      - 'languages/**'
      - 'build.sh'
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build single file version
        run: |
          chmod +x build.sh
          ./build.sh
      
      - name: Test single file version
        run: |
          echo "0" | bash dist/quickstart.sh || true
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-sh
          path: dist/quickstart.sh
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/quickstart.sh
