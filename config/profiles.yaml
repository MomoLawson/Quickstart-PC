profiles:
  recommended:
    name: "推荐套餐"
    desc: "综合均衡，适合大多数用户"
    icon: "⭐"
    includes:
      - browser.chrome
      - browser.edge
      - devtools.vscode
      - devtools.git
      - devtools.nodejs
      - devtools.python
      - office.wps
      - media.vlc

  ai:
    name: "AI 赋能"
    desc: "AI CLI 工具、智能 IDE、大模型客户端"
    icon: "🤖"
    includes:
      - ai.cursor
      - ai.ollama
      - ai.lmstudio

  office:
    name: "办公套件"
    desc: "文档、表格、协作工具"
    icon: "📊"
    includes:
      - office.wps
      - office.obsidian
      - office.notion

  developer:
    name: "开发者套餐"
    desc: "IDE、版本控制、运行时环境"
    icon: "💻"
    includes:
      - devtools.vscode
      - devtools.intellij
      - devtools.git
      - devtools.nodejs
      - devtools.python
      - devtools.go
      - devtools.docker

  media:
    name: "媒体创作"
    desc: "音视频、图像处理工具"
    icon: "🎬"
    includes:
      - media.vlc
      - media.obs

software:
  browser.chrome:
    name: "Chrome"
    win: "winget install Google.Chrome"
    mac: "brew install --cask google-chrome"
    linux: "sudo apt install -y google-chrome-stable"
  
  browser.edge:
    name: "Edge"
    win: "winget install Microsoft.Edge"
    mac: "brew install --cask microsoft-edge"
    linux: "curl -o /tmp/microsoft-edge.deb https://packages.microsoft.com/repos/edge && sudo dpkg -i /tmp/microsoft-edge.deb"

  devtools.vscode:
    name: "VS Code"
    win: "winget install Microsoft.VisualStudioCode"
    mac: "brew install --cask visual-studio-code"
    linux: "sudo snap install --classic code"

  devtools.intellij:
    name: "IntelliJ IDEA"
    win: "winget install JetBrains.IntelliJIDEA.Community"
    mac: "brew install --cask intellij-idea-ce"
    linux: "curl -o /tmp/idea.tar.gz https://download.jetbrains.com/product?code=IIC&latest&platform=linux && sudo tar -xzf /tmp/idea.tar.gz -C /opt"

  devtools.git:
    name: "Git"
    win: "winget install Git.Git"
    mac: "brew install git"
    linux: "sudo apt install -y git"

  devtools.nodejs:
    name: "Node.js"
    win: "winget install OpenJS.NodeJS.LTS"
    mac: "brew install node"
    linux: "curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash - && sudo apt install -y nodejs"

  devtools.python:
    name: "Python"
    win: "winget install Python.Python.3.11"
    mac: "brew install python@3.11"
    linux: "sudo apt install -y python3 python3-pip"

  devtools.go:
    name: "Go"
    win: "winget install Golang.Go"
    mac: "brew install go"
    linux: "sudo apt install -y golang"

  devtools.docker:
    name: "Docker"
    win: "winget install Docker.DockerDesktop"
    mac: "brew install --cask docker"
    linux: "curl -fsSL https://get.docker.com | sh"

  office.wps:
    name: "WPS Office"
    win: "winget install Kingsoft.WPSOffice"
    mac: "brew install --cask wps-office"
    linux: "sudo apt install -y wps-office"

  office.obsidian:
    name: "Obsidian"
    win: "winget install Obsidian.Obsidian"
    mac: "brew install --cask obsidian"
    linux: "sudo snap install obsidian --classic"

  office.notion:
    name: "Notion"
    win: "winget install Notion.Notion"
    mac: "brew install --cask notion"
    linux: "sudo snap install notion-snap"

  ai.cursor:
    name: "Cursor"
    win: "winget install Cursor.Cursor"
    mac: "brew install --cask cursor"
    linux: "curl -o /tmp/cursor.AppImage https://cursor.sh/linux/x64 && chmod +x /tmp/cursor.AppImage"

  ai.ollama:
    name: "Ollama"
    win: "powershell -Command \"irm https://ollama.ai/install.ps1 | iex\""
    mac: "brew install ollama"
    linux: "curl -fsSL https://ollama.ai/install.sh | sh"

  ai.lmstudio:
    name: "LM Studio"
    win: "winget install LMStudio.LMStudio"
    mac: "brew install --cask lm-studio"
    linux: "curl -o /tmp/lm-studio.AppImage https://releases.lmstudio.ai/linux/x64/$(curl -s https://releases.lmstudio.ai/linux/x64/latest)"

  media.vlc:
    name: "VLC"
    win: "winget install VideoLAN.VLC"
    mac: "brew install --cask vlc"
    linux: "sudo apt install -y vlc"

  media.obs:
    name: "OBS Studio"
    win: "winget install OBSProject.OBSStudio"
    mac: "brew install --cask obs"
    linux: "sudo apt install -y obs-studio"
